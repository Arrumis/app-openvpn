services:
  openvpn-as:
    image: lscr.io/linuxserver/openvpn-as:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    privileged: true
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-Asia/Tokyo}"
      INTERFACE: "${INTERFACE:-eth0}"
    volumes:
      - "${OPENVPN_CONFIG_DIR:-${HOST_DATA_DIR:-./data}/config}:/config"
    ports:
      - "${ADMIN_UI_PORT:-943}:943"
      - "${HTTPS_PORT:-9443}:9443"
      - "${VPN_UDP_PORT:-1194}:1194/udp"
    logging:
      driver: syslog
      options:
        tag: "openvpn"
